name: Build iOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Disable Flutter Analytics
        run: flutter config --no-analytics

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Verify pubspec integrity
        run: flutter pub get --dry-run

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Analyze Flutter code
        run: flutter analyze

      - name: Build iOS Release
        run: flutter build ios --release --no-codesign

      - name: Create ExportOptions.plist
        run: |
          cat > ios/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>teamID</key>
              <string></string>
              <key>thinning</key>
              <string>&lt;none&gt;</string>
          </dict>
          </plist>
          PLIST

      - name: Build Archive
        run: |
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -derivedDataPath build \
            -archivePath build/Runner.xcarchive \
            archive
          cd ..

      - name: Export IPA
        run: |
          cd ios
          xcodebuild -exportArchive \
            -archivePath build/Runner.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist
          cd ..

      - name: Verify IPA
        run: |
          if [ -f ios/build/ipa/Runner.ipa ]; then
            echo "✅ IPA built successfully"
            ls -lh ios/build/ipa/Runner.ipa
          else
            echo "❌ IPA build failed"
            exit 1
          fi

      - name: Upload IPA Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ios/build/ipa/Runner.ipa
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ios/build/
          retention-days: 7
