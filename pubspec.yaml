name: usage_tracker
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  shared_preferences: ^2.2.3

  firebase_core: ^3.13.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.7

  workmanager: ^0.7.0
  http: ^1.2.1
  mailer: ^6.1.0
  flutter_tts: ^4.2.0

dev_dependencies:

  flutter_launcher_icons: ^0.14.1
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.4.7

flutter:

  uses-material-design: true

  assets:
    - assets/splash_logo.png
    - assets/logo.png
    - assets/neuro_logo.png


flutter_native_splash:
  color: "#000000"
  image: assets/splash_logo.png
  fullscreen: true
  android_gravity: fill

  android: true
  ios: true

  android_12:
    color: "#000000"
    icon_background_color: "#000000"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/neuro_logo.png"
  adaptive_icon_background: "#48249A"
  adaptive_icon_foreground: "assets/neuro_logo.png"
  min_sdk_android: 21